name: instagrab
description: Clipboard watcher that auto-downloads Instagram reels.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  flutter_local_notifications: ^17.2.1
  gal: ^2.3.0
  # share_plus removed - caused ClassNotFound crash
  url_launcher: ^6.2.5
  html: ^0.15.4
  intl: ^0.19.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
